name: CI

on:
  push:
  pull_request:

jobs:
  go:
    name: Go (build, vet, unit + integration)
    runs-on: ubuntu-latest
    services:
      timescaledb:
        image: timescale/timescaledb:2.17.2-pg17
        env:
          POSTGRES_USER: labmon
          POSTGRES_PASSWORD: labmon-test
          POSTGRES_DB: labmon
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U labmon -d labmon"
          --health-interval 5s --health-timeout 5s --health-retries 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
          cache-dependency-path: server/go.sum
      - name: Build & vet
        working-directory: server
        run: |
          go build ./...
          go vet ./...
      - name: Test (unit + DB integration)
        working-directory: server
        env:
          # Set => the gated integration tests (idempotency, time_bucket,
          # continuous aggregates, config/thresholds) run against the service DB.
          TEST_DATABASE_URL: postgres://labmon:labmon-test@localhost:5432/labmon?sslmode=disable
        run: go test ./...

  python:
    name: Python collector tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        working-directory: collector
        run: pip install -r requirements-dev.txt
      - name: pytest
        working-directory: collector
        run: python -m pytest tests/ -q

  web:
    name: Web build (tsc + vite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install
        working-directory: web
        run: npm ci
      - name: Build (typecheck + bundle)
        working-directory: web
        run: npm run build
