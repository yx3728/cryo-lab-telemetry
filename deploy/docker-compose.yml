# Production stack for the t4g.small (ARM) EC2 box.
#
#   cd deploy && docker compose up -d --build
#
# Secrets come from deploy/.env (NOT committed; created on the box). Compose
# substitutes ${VARS} below from that file. The optional 'mockfeed' profile runs
# a mock collector so the public dashboard has live data before the real lab PC
# is wired (see WIRING.md):
#
#   docker compose --profile mockfeed up -d --build
name: lab-monitor

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../web/dist:/srv/www:ro          # static React build (built on the dev Mac)
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data                 # persisted Let's Encrypt certs/account
      - caddy_config:/config
    depends_on:
      - go-api

  go-api:
    build:
      context: ../server
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://labmon:${POSTGRES_PASSWORD}@timescaledb:5432/labmon?sslmode=disable
      HTTP_ADDR: ":8080"
      # The lab source token, plus any extra per-source tokens (the planned
      # high-frequency channel, or temporary load-test sources). EXTRA_INGEST_TOKENS
      # must start with a leading comma, e.g. ",bench0:abc,bench1:def".
      INGEST_TOKENS: "unisoku-stm:${INGEST_TOKEN}${EXTRA_INGEST_TOKENS:-}"
      # pgx pool size — lifted from the default of 4 on the 2-core box, kept under
      # Postgres' max_connections (25 on the tuned image).
      DB_MAX_CONNS: ${DB_MAX_CONNS:-10}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_TTL_HOURS: ${JWT_TTL_HOURS:-24}
      ALERT_DEBOUNCE_SECONDS: ${ALERT_DEBOUNCE_SECONDS:-300}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      ALERT_EMAIL_TO: ${ALERT_EMAIL_TO:-}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
    expose:
      - "8080"
    depends_on:
      timescaledb:
        condition: service_healthy

  timescaledb:
    image: timescale/timescaledb:2.17.2-pg17
    restart: unless-stopped
    environment:
      POSTGRES_USER: labmon
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: labmon
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U labmon -d labmon"]
      interval: 5s
      timeout: 3s
      retries: 20

  # InfluxDB -> AWS forwarder: mirrors the lab's InfluxDB Cloud data (temps +
  # pressures) into AWS, so the dashboard replicates Grafana without touching lab
  # hardware. Read-only InfluxDB consumer; safe alongside the lab's suite.
  forwarder:
    build:
      context: ../forwarder
    restart: unless-stopped
    environment:
      INFLUX_URL: ${INFLUX_URL}
      INFLUX_TOKEN: ${INFLUX_TOKEN}
      INFLUX_ORG: ${INFLUX_ORG}
      INFLUX_TEMP_BUCKET: ${INFLUX_TEMP_BUCKET:-Temperature_Logger}
      INFLUX_PRESSURE_BUCKET: ${INFLUX_PRESSURE_BUCKET:-Pressure_Logger}
      INGEST_URL: http://go-api:8080
      INGEST_TOKEN: ${INGEST_TOKEN}
      SOURCE: unisoku-stm
      FORWARDER_POLL_SECONDS: ${FORWARDER_POLL_SECONDS:-15}
    depends_on:
      - go-api

  # Optional demo feed — mock instrument data so the dashboard is live before the
  # real lab PC is wired. Enabled only with `--profile mockfeed`.
  collector:
    build:
      context: ../collector
    profiles: ["mockfeed"]
    restart: unless-stopped
    environment:
      INGEST_URL: http://go-api:8080
      INGEST_TOKEN: ${INGEST_TOKEN}
      SOURCE: unisoku-stm
      READER: mock
    depends_on:
      - go-api

volumes:
  caddy_data:
  caddy_config:
  pgdata:
